# Conda/mamba environment installed INSIDE the Docker image.
# Pinning versions keeps the image reproducible (a core point of containerizing
# bioinformatics tools: anyone who builds this gets the exact same toolchain).
name: base
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11      # used by scripts/simulate_data.sh to make a tiny reference
  - bwa=0.7.18       # short-read aligner (reads -> reference)
  - samtools=1.20    # SAM/BAM manipulation: sort, index, faidx
  - bcftools=1.20    # variant calling + VCF manipulation
  - wgsim            # read simulator (ships with samtools source); makes tiny test data
